<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal Tile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; background: #121212; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #root { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
    /* Hide xterm.js measurement artifacts visually without breaking measurement */
    .xterm-char-measure-element { position: absolute !important; left: -9999px !important; }
    /* Remove xterm internal padding */
    .xterm { padding: 0 !important; }
    .xterm-screen { padding: 0 2px !important; }
    /* Make selection layer semi-transparent so text shows through */
    .xterm .xterm-selection { opacity: 0.4 !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
