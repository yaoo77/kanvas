appId: com.kawase.app
productName: kawase
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - node_modules/sharp/**/*
  - node_modules/node-pty/**/*
asar: true
asarUnpack:
  - node_modules/sharp/**/*
  - node_modules/node-pty/**/*
mac:
  target:
    - target: dir
      arch:
        - arm64
  category: public.app-category.developer-tools
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  identity: null
extraResources:
  - from: resources/
    to: .
npmRebuild: false
nodeGypRebuild: false
